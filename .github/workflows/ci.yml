name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Release credentials are deliberately not available to CI.
permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }} tests and quality gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Run unit and CLI tests
        run: poe test

      - name: Run lint
        run: poe lint

      - name: Run format check
        run: poe format-check

      - name: Run type check
        run: poe typecheck

  breez-resolution-and-import:
    name: Breez import (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Oldest/newest supported CPython on each documented platform.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Resolve Breez extra and import its SDK
        # This intentionally imports only. It neither loads wallet secrets nor makes payments.
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install ".[breez]" &&
          python -c "import breez_sdk_spark; print(breez_sdk_spark.__name__)"

  required-check:
    name: Tests and quality gates
    needs: [quality, breez-resolution-and-import]
    if: >-
      ${{ always() && needs.quality.result == 'success' &&
      needs.breez-resolution-and-import.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Confirm all CI jobs passed
        run: "true"
