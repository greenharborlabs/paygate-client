name: Rust integration qualification

on:
  workflow_dispatch:
    inputs:
      enable_integration_qualification:
        description: "Run the expensive, non-paying Wave 5 gate for one source/lock candidate."
        required: true
        type: boolean
        default: false

# This workflow has no payment or wallet secrets.  Live canaries are isolated
# in rust-payment-canary.yml and require their own explicit approval.
permissions:
  contents: read

jobs:
  qualification:
    if: ${{ inputs.enable_integration_qualification }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6.0.0
        with:
          python-version: "3.11.14"
      - name: Prime a fresh locked Cargo home (network preparation only)
        env:
          QUALIFICATION_CARGO_HOME: ${{ runner.temp }}/paygate-cargo-home
        run: |
          set -euo pipefail
          test ! -e "$QUALIFICATION_CARGO_HOME" || { echo "qualification Cargo home already exists" >&2; exit 1; }
          mkdir -p "$QUALIFICATION_CARGO_HOME"
          rustup toolchain install 1.88.0 --profile minimal
          CARGO_HOME="$QUALIFICATION_CARGO_HOME" cargo +1.88.0 fetch --locked
          # The advisory snapshot is reviewed data; this phase may refresh it
          # only through a separately reviewed maintenance change.
      - name: Replay semantic Python compatibility and Rust integration gates
        env:
          CARGO_HOME: ${{ runner.temp }}/paygate-cargo-home
          CARGO_NET_OFFLINE: "true"
          PAYGATE_QUALIFICATION_PYTHON: python3
        run: |
          set -euo pipefail
          test -d "$CARGO_HOME"
          python3 -c 'import sys; assert sys.version_info[:2] == (3, 11)'
          cargo +1.88.0 metadata --locked --offline --all-features --format-version 1 > cargo-metadata.json
          python3 scripts/check-rust-licenses.py --self-test
          python3 scripts/check-rust-licenses.py cargo-metadata.json
          python3 scripts/check-rust-advisories.py --lock Cargo.lock --snapshot security/advisory-snapshot.json
          python3 -m compat.python_oracle.replay > python-oracle-evidence.json
          python3 scripts/extract-python-semantic-evidence.py python-oracle-evidence.json python-semantic-evidence.json
          PAYGATE_SEMANTIC_EVIDENCE=rust-semantic-evidence.json cargo +1.88.0 test --locked --offline --test oracle_semantic_bridge
          python3 scripts/check-oracle-semantic-contract.py --oracle python-semantic-evidence.json --rust-evidence rust-semantic-evidence.json
          # wave3_cli_state compares JSON/state semantics to the frozen Python
          # evidence; it intentionally does not compare human formatting bytes.
          cargo +1.88.0 fmt --check
          RUSTFLAGS=-Dwarnings cargo +1.88.0 clippy --locked --offline --all-targets --all-features -- -D warnings
          cargo +1.88.0 test --locked --offline
          cargo +1.88.0 test --locked --offline --doc
          cargo +1.88.0 test --locked --offline --test wave3_cli_state --test wave4_payer_adapters
          cargo +1.88.0 test --locked --offline --test keyring_qualification --test breez_lifecycle_qualification
          cargo +1.88.0 test --locked --offline --test interface_contract --test dependency_qualification
          cargo +1.88.0 test --locked --offline --test wave3_cli_state separate_processes_contend_for_exclusive_budget_ownership
          # The property/fuzz smoke is deterministic and must never use a payer.
          cargo +1.88.0 test --locked --offline --test fuzz_smoke
          git diff --check
