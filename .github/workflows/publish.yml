name: Build and publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to build and validate (dry run only; cannot publish)"
        required: false
        default: "main"
        type: string

# Ordinary jobs receive only read-only repository access; PyPI OIDC is scoped
# exclusively to the environment-gated publish job below.
permissions:
  contents: read

jobs:
  build-and-validate:
    name: Build and validate immutable release artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out the release tag or dry-run ref with full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.1.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify release provenance before building
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)"
          if [ "$EVENT_NAME" = release ]; then
            if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "release tag must be vX.Y.Z: $RELEASE_TAG" >&2
              exit 1
            fi
            # A release event identifies its tag. Fetch that exact remote tag,
            # require it to be annotated, and resolve its immutable commit.
            # GitHub ignores target_commitish once the tag already exists, so it
            # is not release provenance and must not be used here.
            git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = tag
            tag_sha=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
            test "$(git rev-parse HEAD)" = "$tag_sha"
            git merge-base --is-ancestor "$tag_sha" origin/main
          fi
          version=$(python -c 'from paygate_client import __version__; print(__version__)')
          if [ "$EVENT_NAME" = release ]; then
            test "$RELEASE_TAG" = "v$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build exactly one sdist and wheel
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build twine
          rm -rf dist
          python -m build --sdist --wheel --outdir dist
          test "$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l | tr -d ' ')" = 1
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')" = 1

      - name: Validate metadata and clean installs
        run: scripts/check-dist.sh dist "${{ steps.release.outputs.version }}"

      - name: Create immutable SHA-256 manifest
        run: |
          set -euo pipefail
          mkdir release-metadata
          (cd dist && sha256sum -- *.whl *.tar.gz > ../release-metadata/SHA256SUMS)
          (cd dist && sha256sum --check ../release-metadata/SHA256SUMS)
          printf '%s\n' '${{ steps.release.outputs.version }}' > release-metadata/VERSION

      - name: Retain validated release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paygate-client-release-dist
          path: |
            dist/
            release-metadata/
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish validated bytes through PyPI Trusted Publishing
    # workflow_dispatch is structurally ineligible: this job cannot start or mint OIDC.
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build-and-validate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/paygate-client
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download the validated artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paygate-client-release-dist
          path: .

      - name: Verify transferred bytes and release metadata
        env:
          VERSION: ${{ needs.build-and-validate.outputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          test "$RELEASE_TAG" = "v$VERSION"
          test "$(cat release-metadata/VERSION)" = "$VERSION"
          (cd dist && sha256sum --check ../release-metadata/SHA256SUMS)
          test "$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l | tr -d ' ')" = 1
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l | tr -d ' ')" = 1

      - name: Preflight PyPI project and version without credentials
        env:
          VERSION: ${{ needs.build-and-validate.outputs.version }}
        run: |
          set -euo pipefail
          status=$(curl --silent --show-error --output pypi-project.json \
            --write-out '%{http_code}' "https://pypi.org/pypi/paygate-client/json")
          case "$status" in
            404)
              echo "PyPI project is not present; this is an expected first-release state."
              ;;
            200)
              python -c 'import json, re, sys; payload = json.load(open("pypi-project.json")); name = payload.get("info", {}).get("name", ""); normalized = re.sub(r"[-_.]+", "-", name).lower(); sys.exit(f"PyPI project-name conflict: expected paygate-client, got {name!r}") if normalized != "paygate-client" else None; sys.exit(f"PyPI already has paygate-client version {sys.argv[1]}; use a new version") if sys.argv[1] in payload.get("releases", {}) else None' "$VERSION"
              ;;
            *)
              echo "unable to safely preflight PyPI project state (HTTP $status)" >&2
              exit 1
              ;;
          esac

      - name: Publish the verified artifacts with PyPI OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          attestations: true

      - name: Verify PyPI accepted the transferred artifact hashes
        env:
          VERSION: ${{ needs.build-and-validate.outputs.version }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            "https://pypi.org/pypi/paygate-client/$VERSION/json" > pypi.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("pypi.json").read_text())
          expected = {
              line.split()[1]: line.split()[0]
              for line in Path("release-metadata/SHA256SUMS").read_text().splitlines()
          }
          accepted = {
              item["filename"]: item["digests"]["sha256"]
              for item in payload["urls"]
          }
          if expected != accepted:
              raise SystemExit(f"PyPI hashes differ: expected {expected}, got {accepted}")
          PY
