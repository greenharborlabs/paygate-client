name: Rust dependency qualification

on:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - src/**
      - scripts/check-rust-linkage.py
      - scripts/check-rust-licenses.py
      - tests/*qualification.rs
      - .github/workflows/rust-qualification.yml
  workflow_dispatch:

# Qualification receives no release, payer, or wallet secrets and never submits payment.
permissions:
  contents: read

jobs:
  dependency-policy:
    name: Immutable dependency policy
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify toolchain, direct pins, and git-source allowlist
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx 'channel = "1.88.0"' rust-toolchain.toml
          grep -F 'lightning-invoice = { version = "=0.34.1"' Cargo.toml
          grep -F 'keyring = "=4.1.5"' Cargo.toml
          grep -F 'serde-saphyr = { version = "=0.0.29"' Cargo.toml
          grep -F 'rev = "f660f5a3bf24323e5c14235efcd28e5aef06c8aa"' Cargo.toml
          python3 - <<'PY'
          import re
          from pathlib import Path

          allowed = {
              "git+https://github.com/breez/spark-sdk.git?rev=f660f5a3bf24323e5c14235efcd28e5aef06c8aa#f660f5a3bf24323e5c14235efcd28e5aef06c8aa",
              "git+https://github.com/breez/boltz-client?rev=809ac77cfc9ab2d809e3ef05f31c6d23ee9c4730#809ac77cfc9ab2d809e3ef05f31c6d23ee9c4730",
              "git+https://github.com/lightsparkdev/frost?rev=9aaf1b6b9fa3c2c3c2c7c70da83061deda1a9180#9aaf1b6b9fa3c2c3c2c7c70da83061deda1a9180",
          }
          lock = Path("Cargo.lock").read_text()
          actual = set(re.findall(r'^source = "(git\+[^"]+)"$', lock, re.MULTILINE))
          if actual != allowed:
              raise SystemExit(f"git source allowlist mismatch: {sorted(actual ^ allowed)}")
          PY
      - name: Audit the locked graph
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          cargo +1.88.0 install cargo-audit --version 0.21.2 --locked
          cargo +1.88.0 audit --deny warnings
          cargo +1.88.0 metadata --locked --all-features --format-version 1 > /tmp/metadata.json
          python3 scripts/check-rust-licenses.py --self-test
          python3 scripts/check-rust-licenses.py /tmp/metadata.json

  native-qualification:
    name: Native qualification (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            linux_platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            linux_platform: linux/arm64/v8
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            linux_platform: ""
          - target: aarch64-apple-darwin
            runner: macos-15
            linux_platform: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prepare an offline-resolvable vendor tree
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          rustup +1.88.0 target add "$TARGET"
          cargo +1.88.0 fetch --locked --target "$TARGET"
          mkdir -p .cargo
          cargo +1.88.0 vendor --locked --versioned-dirs vendor > .cargo/config.toml
      - name: Qualify the native credential backend and schema-v1 fallback
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check 'keyring==25.6.0'
          if [[ "$TARGET" == *-unknown-linux-gnu ]]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends dbus-x11 gnome-keyring
            # shellcheck disable=SC2016
            dbus-run-session -- bash -ceu '
              eval "$(printf %s test-password | gnome-keyring-daemon --unlock --components=secrets)"
              cargo +1.88.0 test --locked --test keyring_qualification
              cargo +1.88.0 test --locked --test keyring_qualification -- --ignored --exact os_keyring_has_independent_bidirectional_and_legacy_probes
            '
          else
            cargo +1.88.0 test --locked --test keyring_qualification
            cargo +1.88.0 test --locked --test keyring_qualification -- --ignored --exact os_keyring_has_independent_bidirectional_and_legacy_probes
          fi
      - name: Build, test, and run non-paying prototypes
        env:
          TARGET: ${{ matrix.target }}
          LINUX_PLATFORM: ${{ matrix.linux_platform }}
          BUILD_IMAGE: rust@sha256:b315f988b86912bafa7afd39a6ded0a497bf850ec36578ca9a3bdd6a14d5db4e
          PAYGATE_QUALIFICATION_TARGET: ${{ matrix.target }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail
          run_qualification() {
            export CARGO_NET_OFFLINE=true
            cargo +1.88.0 test --locked --test interface_contract --test dependency_qualification
            cargo +1.88.0 test --locked --release --features breez-qualification --test breez_lifecycle_qualification -- --ignored --exact connect_readiness_prepare_disconnect_without_send
            cargo +1.88.0 build --locked --offline --release --features breez-qualification --target "$TARGET"
            "target/$TARGET/release/paygate" --version
          }
          if [[ "$TARGET" == *-unknown-linux-gnu ]]; then
            docker run --rm --platform "$LINUX_PLATFORM" \
              -e CARGO_NET_OFFLINE=true \
              -e PAYGATE_QUALIFICATION_TARGET="$TARGET" \
              -e GITHUB_RUN_ID -e GITHUB_RUN_ATTEMPT \
              -e TARGET="$TARGET" \
              -v "$GITHUB_WORKSPACE:/work" -w /work "$BUILD_IMAGE" \
              bash -ceu 'apt-get update; apt-get install -y --no-install-recommends protobuf-compiler cmake pkg-config; cargo test --locked --test interface_contract --test dependency_qualification; cargo test --locked --release --features breez-qualification --test breez_lifecycle_qualification -- --ignored --exact connect_readiness_prepare_disconnect_without_send; cargo build --locked --offline --release --features breez-qualification --target "$TARGET"; "target/$TARGET/release/paygate" --version'
          else
            export MACOSX_DEPLOYMENT_TARGET=15.0
            command -v protoc >/dev/null || brew install protobuf
            run_qualification
          fi
      - name: Inspect minimum runtime and dynamic linkage
        env:
          TARGET: ${{ matrix.target }}
          LINUX_PLATFORM: ${{ matrix.linux_platform }}
          RUNTIME_IMAGE: rust@sha256:b315f988b86912bafa7afd39a6ded0a497bf850ec36578ca9a3bdd6a14d5db4e
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check-rust-linkage.py --self-test
          binary="target/$TARGET/release/paygate"
          if [[ "$TARGET" == *-unknown-linux-gnu ]]; then
            docker run --rm --platform "$LINUX_PLATFORM" -v "$GITHUB_WORKSPACE:/work:ro" "$RUNTIME_IMAGE" bash -ceu '
              getconf GNU_LIBC_VERSION | grep -Fx "glibc 2.31"
              python3 /work/scripts/check-rust-linkage.py '"$TARGET"' "/work/target/'"$TARGET"'/release/paygate"
              for executable in /work/target/release/deps/breez_lifecycle_qualification-*; do
                test -x "$executable" || continue
                python3 /work/scripts/check-rust-linkage.py '"$TARGET"' "$executable"
              done
              "/work/target/'"$TARGET"'/release/paygate" --version
            '
          else
            python3 scripts/check-rust-linkage.py "$TARGET" "$binary"
            for executable in target/release/deps/breez_lifecycle_qualification-*; do
              test -x "$executable" || continue
              python3 scripts/check-rust-linkage.py "$TARGET" "$executable"
            done
            "$binary" --version
          fi

  qualification-gate:
    name: Rust qualification gate
    if: always()
    needs: [dependency-policy, native-qualification]
    runs-on: ubuntu-22.04
    steps:
      - name: Require every policy and native matrix leg
        env:
          POLICY_RESULT: ${{ needs.dependency-policy.result }}
          NATIVE_RESULT: ${{ needs.native-qualification.result }}
        run: |
          set -euo pipefail
          test "$POLICY_RESULT" = success
          test "$NATIVE_RESULT" = success
